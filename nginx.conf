server {
    listen 80;
    server_name localhost;

    # The root directory where your files are located
    root /usr/share/nginx/html;

    # Set the default file to serve
    index HomePage.html;

    # This rule helps handle direct navigation to your HTML pages.
    # It tries to find the file directly, and if not, falls back to the homepage.
    location / {
        try_files $uri $uri.html /HomePage.html;
    }
}
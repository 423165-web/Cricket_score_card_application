<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Score Card Application</title>
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="HomePage.css">
    <script src="HomePage.js" defer></script>
</head>

<body>
    <h1>Welcome to CrickHero</h1>

    <div class="buttons">
        <button onclick="GotoToss()">Toss</button>
        <button onclick="GotoNewMatch()">New Match</button>
        <button onclick="GotoPreviousMatch()">Previous Match</button>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
</body>
</html>

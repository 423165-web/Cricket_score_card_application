# This is the name of your GitHub Actions workflow.
name: Cricket Score App CI

# This section defines when the workflow should run.
on:
  # Run on every push to the 'main' branch.
  push:
    branches: [ main ]
  # Also run on every pull request that targets the 'main' branch.
  pull_request:
    branches: [ main ]

# This section defines the jobs to be executed.
jobs:
  test:
    name: Build and Test in Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image and run tests
        # This step builds the Docker image using Dockerfile.test.
        # The RUN commands inside the Dockerfile for 'npm ci' and 'npm run test:unit' are executed here.
        # If any of those commands fail, the build will fail, and the workflow will stop.
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.test # Specify the test Dockerfile
          push: false # We don't need to push this test image

      # This step runs the Cypress E2E tests after the Docker build is successful.
      # It uses the official Cypress GitHub Action, which handles starting a server
      # and running tests against it in a headless browser.
      - name: Run E2E tests
        uses: cypress-io/github-action@v6
        with:
          # The command to start your web server.
          start: npm run start
          # The URL Cypress should wait for before starting tests.
          wait-on: 'http://localhost:8080'
          # The command to run the Cypress tests.
          command: npm run test:e2e
          # Run tests in the browser of your choice.
          browser: chrome
          # Record the test run on the Cypress Dashboard (optional)
          # record: true
        # env:
          # CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          
      - name: Upload Unit Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-unit-test-report
          path: jest-reports/

      - name: Upload E2E Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-e2e-test-report
          path: cypress/reports/

  # This is the new deployment job.
  deploy:
    name: Deploy to GitHub Pages
    # This job depends on the 'test' job. It will only run if 'test' succeeds.
    needs: test
    # Grant permissions for the workflow to write to GitHub Pages.
    permissions:
      pages: write
      id-token: write
    # Define the deployment environment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire directory, as it's a static site.
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # This new job builds and pushes your Docker image to Docker Hub.
  build-scan-and-push-docker:
    name: Build, Scan, and Push Docker Image
    # It also runs only after the 'test' job succeeds.
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Docker Hub using secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # This step builds the Docker image and tags it, but does not push it yet.
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Do not push the image yet
          load: true # Load the image into the local Docker engine for scanning
          tags: |
            patnamkarthik/cricket-score-app:${{ github.sha }}
            patnamkarthik/cricket-score-app:latest

      # This step scans the image for vulnerabilities using Trivy.
      # The workflow will fail if any CRITICAL or HIGH severity vulnerabilities are found.
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.50.1
        with:
          image-ref: 'patnamkarthik/cricket-score-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # This step will only run if the Trivy scan (the previous step) is successful.
      - name: Push Docker image to Docker Hub
        run: |
          docker push patnamkarthik/cricket-score-app:${{ github.sha }}
          docker push patnamkarthik/cricket-score-app:latest